name: AirPollution MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: |
        flake8 air_quality tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 air_quality tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Run unit tests with pytest
      env:
        DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
        AWS_ACCESS_KEY_ID: "dummy_aws_key"
        AWS_SECRET_ACCESS_KEY: "dummy_aws_secret"
        AWS_DEFAULT_REGION: "us-east-1"
        DB_HOST: "localhost"
        DB_USER: "dummy_user"
        DB_PASSWORD: "dummy_password"
        GROQ_API_KEY: "gsk_dummy_key_123456789"
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python -m pytest tests/ --cov=air_quality --cov-report=xml -v